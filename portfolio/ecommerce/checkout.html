<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Checkout - ElectroMart</title>
    <meta name="description" content="Modern electronics eCommerce store built with Bootstrap 5 and JavaScript">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">

</head>
<body>

    <!-- ========================
         NAVBAR
    ========================== -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top shadow-sm">
        <div class="container">

            <a class="navbar-brand fw-bold" href="index.html">
                <i class="bi bi-cpu-fill me-2"></i>
                ElectroMart
            </a>

            <button
                class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#mainNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="mainNav">

                <ul class="navbar-nav ms-auto align-items-lg-center">

                    <li class="nav-item">
                        <a href="index.html#products-section" class="nav-link">
                            Products
                        </a>
                    </li>

                    <li class="nav-item">
                        <button
                            id="themeToggle"
                            class="btn btn-outline-light btn-sm ms-lg-3">
                            <i class="bi bi-moon-stars-fill"></i>
                        </button>
                    </li>

                </ul>

            </div>

        </div>
    </nav>

<div class="container py-5">

    <div class="row">

        <div class="col-lg-8">

            <div class="card shadow-sm">

                <div class="card-body">

                    <h3 class="mb-4">
                        Billing Details
                    </h3>

                    <form id="checkoutForm">

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    First Name
                                </label>

                                <input
                                    type="text"
                                    class="form-control"
                                    required>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Last Name
                                </label>

                                <input
                                    type="text"
                                    class="form-control"
                                    required>

                            </div>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Email
                            </label>

                            <input
                                type="email"
                                class="form-control"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Phone
                            </label>

                            <input
                                type="tel"
                                class="form-control"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Address
                            </label>

                            <textarea
                                class="form-control"
                                rows="3"
                                required>
                            </textarea>

                        </div>

                        <div class="mb-4">

                            <label class="form-label">
                                Payment Method
                            </label>

                            <select
                                class="form-select"
                                required>

                                <option value="">
                                    Select
                                </option>

                                <option>
                                    Credit Card
                                </option>

                                <option>
                                    Debit Card
                                </option>

                                <option>
                                    UPI
                                </option>

                                <option>
                                    Cash On Delivery
                                </option>

                            </select>

                        </div>

                        <button
                            type="submit"
                            class="btn btn-success btn-lg">

                            Place Order

                        </button>

                    </form>

                </div>

            </div>

        </div>

        <div class="col-lg-4">

            <div class="card shadow-sm">

                <div class="card-body">

                    <h4 class="mb-3">
                        Order Summary
                    </h4>

                    <div id="checkoutItems"></div>

                    <hr>

                    <h5>

                        Total:
                        <span id="checkoutTotal">
                            $0.00
                        </span>

                    </h5>

                </div>

            </div>

        </div>

    </div>

</div>

	
    <!-- =========================
         FOOTER
    ========================== -->
    <footer class="bg-dark text-light py-4">

        <div class="container text-center">

            <p class="mb-0">
				© <span id="currentYear"></span>
				ElectroMart. All rights reserved.
			</p>

        </div>

    </footer>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- App Scripts -->
    <script src="js/products.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
	<script src="js/checkout.js"></script>

</body>
</html>
